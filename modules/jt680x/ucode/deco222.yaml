include:
  - 65c02.yaml
ops:
  - { name: DNOPI,  op: 0x02, cycles: 2, ctl: { addr: imm  }}
  - { name: DNOPI,  op: 0x22, cycles: 2, ctl: { addr: imm  }}
  - { name: DNOPI,  op: 0x42, cycles: 2, ctl: { addr: imm  }}
  - { name: DNOPI,  op: 0x62, cycles: 2, ctl: { addr: imm  }}
  - { name: DNOPI,  op: 0x82, cycles: 2, ctl: { addr: imm  }}
  - { name: DNOPI,  op: 0xC2, cycles: 2, ctl: { addr: imm  }}
  - { name: DNOPI,  op: 0xE2, cycles: 2, ctl: { addr: imm  }}
  - { name: DNOPZ,  op: 0x44, cycles: 3, ctl: { addr: zp   }}
  - { name: DNOPZX, op: 0x54, cycles: 4, ctl: { addr: zpx  }}
  - { name: DNOPZX, op: 0xD4, cycles: 4, ctl: { addr: zpx  }}
  - { name: DNOPZX, op: 0xF4, cycles: 4, ctl: { addr: zpx  }}
  - { name: DNOPAX, op: 0x5C, cycles: 4, ctl: { addr: absx }}
  - { name: DNOPAX, op: 0xDC, cycles: 4, ctl: { addr: absx }}
  - { name: DNOPAX, op: 0xFC, cycles: 4, ctl: { addr: absx }}

ucode:
  - mnemo: [
      DNOPI, DNOPZ, DNOPZX, DNOPAX
    ]
    seq:
      - ${addr}_jsr, inc_pc
      - fetch
      - ni
