name: Compile all

on:
  workflow_dispatch:
  repository_dispatch:
    types: rebuild
  workflow_run:
    workflows:
      - Framework Unit Tests
      - Verilator/MRA linter
      - Unit Simulations
    types:
      - completed
  schedule:
    - cron: '0 3 * * *' # runs every night at 3am

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}-compile-all
  cancel-in-progress: true

jobs:
  check_pr_checks:
    runs-on: ubuntu-latest
    outputs:
      can_run: ${{ steps.pr_checks.outputs.can_run }}
    steps:
      - id: pr_checks
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WF_EVENT: ${{ github.event.workflow_run.event }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" != "workflow_run" ]]; then
            echo "can_run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${WF_EVENT}" != "pull_request" ]]; then
            echo "can_run=false" >> "${GITHUB_OUTPUT}"
            echo "Compile-all only runs for pull_request workflow_run events."
            exit 0
          fi

          can_run=true
          required_workflows=$(
            cat <<'EOF'
            framework.yaml:Framework Unit Tests
            linter.yaml:Verilator/MRA linter
            simunit.yaml:Unit Simulations
            EOF
          )

          while IFS=':' read -r workflow_file workflow_name; do
            if ! response=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${API_URL}/repos/${REPO}/actions/workflows/${workflow_file}/runs?head_sha=${HEAD_SHA}&status=completed&per_page=5"); then
              can_run=false
              echo "Unable to query prerequisite workflow '${workflow_name}' for ${HEAD_SHA}."
              break
            fi
            conclusion=$(echo "${response}" | jq -r '.workflow_runs[0].conclusion // empty')
            if [[ -z "${conclusion}" || "${conclusion}" != "success" ]]; then
              can_run=false
              echo "Missing/failed prerequisite workflow '${workflow_name}' for ${HEAD_SHA} (conclusion: ${conclusion:-<not found>})."
              break
            fi
          done <<< "${required_workflows}"

          echo "can_run=${can_run}" >> "${GITHUB_OUTPUT}"
  list_cores:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    needs: [check_pr_checks]
    outputs:
      cores: ${{ steps.generate-matrix.outputs.cores }}
    if: ${{ github.event_name != 'workflow_run' || needs.check_pr_checks.outputs.can_run == 'true' }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        token: ${{ secrets.PAT }}
    - id: generate-matrix
      run: |
        cd cores
        # Get list of cores ready for compilation
        CORES='['
        for i in *; do
          if [[ -e $i/cfg/macros.def && ! -e $i/cfg/skip ]]; then
            if [ "$CORES" != '[' ]; then CORES="$CORES, "; fi
            CORES="$CORES \"$i\""
          fi
        done
        CORES="$CORES ]"
        echo $CORES
        echo "cores=${CORES}" >> $GITHUB_OUTPUT

  compile_cores13:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    needs:
      - list_cores
      - check_pr_checks
    strategy:
      fail-fast: false
      matrix:
        core: ${{ fromJSON(needs.list_cores.outputs.cores) }}
    if: ${{ github.event_name != 'workflow_run' || needs.check_pr_checks.outputs.can_run == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.PAT }}
      - id: compile
        run: |
          # Compilation on Quartus 13
          docker run -e BETAKEY=${{ secrets.BETAKEY }} --network host -v `pwd`:/jtcores jotego/jtcore13 /jtcores/modules/jtframe/devops/xjtcore.sh ${{matrix.core}} mist
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: release-q13-${{ matrix.core }}
          path: release
          retention-days: 1

  mister-pocket:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    needs:
      - list_cores
      - check_pr_checks
    strategy:
      fail-fast: false
      matrix:
        core: ${{ fromJSON(needs.list_cores.outputs.cores) }}
    if: ${{ github.event_name != 'workflow_run' || needs.check_pr_checks.outputs.can_run == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.PAT }}
      - id: compile
        run: |
          # Compilation on Quartus 20.1
          docker run -e BETAKEY=${{ secrets.BETAKEY }} --network host -v `pwd`:/jtcores jotego/jtcore20 /jtcores/modules/jtframe/devops/xjtcore.sh ${{matrix.core}} mister pocket
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: release-mrpocket-${{ matrix.core }}
          path: release
          retention-days: 1

  sidis:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    needs:
      - list_cores
      - check_pr_checks
    strategy:
      fail-fast: false
      matrix:
        core: ${{ fromJSON(needs.list_cores.outputs.cores) }}
    if: ${{ github.event_name != 'workflow_run' || needs.check_pr_checks.outputs.can_run == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.PAT }}
      - id: compile
        run: |
          # Compilation on Quartus 20.1
          docker run -e BETAKEY=${{ secrets.BETAKEY }} --network host -v `pwd`:/jtcores jotego/jtcore20 /jtcores/modules/jtframe/devops/xjtcore.sh ${{matrix.core}} sidi sidi128
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: release-sidis-${{ matrix.core }}
          path: release
          retention-days: 1

  upload:
    runs-on: ubuntu-latest
    needs: [check_pr_checks, compile_cores13, mister-pocket, sidis]
    if: ${{ always() && (github.event_name != 'workflow_run' || needs.check_pr_checks.outputs.can_run == 'true') }} # upload the results even if some core did not compile correctly
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: release-*
          merge-multiple: true
      - name: Set zip file name
        run: |
          echo ARTIFACT_NAME=`git rev-parse --short HEAD`.zip >> "$GITHUB_ENV"
          echo COMMIT_DATE=$(git show -s --format=%ci 2> /dev/null) >> "$GITHUB_ENV"
      - name: Make zip file
        run: |
          ls -l release/*
          echo ARTIFACT_NAME=$ARTIFACT_NAME
          zip -r $ARTIFACT_NAME release
          touch -m -d "$COMMIT_DATE" "$ARTIFACT_NAME"
          ls -l $ARTIFACT_NAME
      - name: Upload bundle
        uses: bayssmekanique/action-simple-file-upload@v2
        with:
          user: ${{ secrets.FTPUSER }}
          password: ${{ secrets.FTPPASS }}
          host: jotego.es
          src: ${{ env.ARTIFACT_NAME }}
          dest: ${{ env.ARTIFACT_NAME }}
      - uses: geekyeggo/delete-artifact@v4
        with:
            name: $ARTIFACT_NAME
