name: Compile all

on:
  workflow_dispatch:
  workflow_call:
  repository_dispatch:
    types: rebuild
  schedule:
    - cron: '0 1 * * *' # GitHub cron is UTC; 3am in GMT+2
jobs:
  check_schedule:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_compile: ${{ steps.check.outputs.should_compile }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'schedule') {
              core.setOutput('should_compile', 'true');
              return;
            }

            const branch = context.ref.replace('refs/heads/', '');
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'compile-all.yaml',
              branch,
              per_page: 100,
            });
            const previousRun = runs.find((run) => run.id !== context.runId);
            const previousRunSucceeded = previousRun &&
              previousRun.status === 'completed' &&
              previousRun.conclusion === 'success';
            const shouldCompile = !previousRunSucceeded || previousRun.head_sha !== context.sha;

            if (previousRun) {
              core.info(`Previous run ${previousRun.id} used ${previousRun.head_sha} and concluded ${previousRun.conclusion}; current is ${context.sha}`);
            } else {
              core.info('No previous run found');
            }
            core.setOutput('should_compile', shouldCompile ? 'true' : 'false');

  list_cores:
    runs-on: ubuntu-latest
    needs:
      - check_schedule
    if: ${{ needs.check_schedule.outputs.should_compile == 'true' }}
    defaults:
      run:
        shell: bash
    outputs:
      cores: ${{ steps.generate-matrix.outputs.cores }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        token: ${{ secrets.PAT }}
    - id: generate-matrix
      run: |
        cd cores
        # Get list of cores ready for compilation
        CORES='['
        for i in *; do
          if [[ -e $i/cfg/macros.def && ! -e $i/cfg/skip ]]; then
            if [ "$CORES" != '[' ]; then CORES="$CORES, "; fi
            CORES="$CORES \"$i\""
          fi
        done
        CORES="$CORES ]"
        echo $CORES
        echo "cores=${CORES}" >> $GITHUB_OUTPUT

  compile_cores13:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    needs:
      - check_schedule
      - list_cores
    if: ${{ needs.check_schedule.outputs.should_compile == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        core: ${{ fromJSON(needs.list_cores.outputs.cores) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.PAT }}
      - id: compile
        run: |
          # Compilation on Quartus 13
          docker run -e BETAKEY=${{ secrets.BETAKEY }} --network host -v `pwd`:/jtcores jotego/jtcore13 /jtcores/modules/jtframe/devops/xjtcore.sh ${{matrix.core}} mist
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: release-q13-${{ matrix.core }}
          path: release
          retention-days: 1

  mister-pocket:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    needs:
      - check_schedule
      - list_cores
    if: ${{ needs.check_schedule.outputs.should_compile == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        core: ${{ fromJSON(needs.list_cores.outputs.cores) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.PAT }}
      - id: compile
        run: |
          # Compilation on Quartus 20.1
          docker run -e BETAKEY=${{ secrets.BETAKEY }} --network host -v `pwd`:/jtcores jotego/jtcore20 /jtcores/modules/jtframe/devops/xjtcore.sh ${{matrix.core}} mister pocket
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: release-mrpocket-${{ matrix.core }}
          path: release
          retention-days: 1

  sidis:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    needs:
      - check_schedule
      - list_cores
    if: ${{ needs.check_schedule.outputs.should_compile == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        core: ${{ fromJSON(needs.list_cores.outputs.cores) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.PAT }}
      - id: compile
        run: |
          # Compilation on Quartus 20.1
          docker run -e BETAKEY=${{ secrets.BETAKEY }} --network host -v `pwd`:/jtcores jotego/jtcore20 /jtcores/modules/jtframe/devops/xjtcore.sh ${{matrix.core}} sidi sidi128
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: release-sidis-${{ matrix.core }}
          path: release
          retention-days: 1

  upload:
    runs-on: ubuntu-latest
    needs: [ check_schedule, compile_cores13, mister-pocket, sidis ]
    if: ${{ always() && needs.check_schedule.outputs.should_compile == 'true' }} # upload the results even if some core did not compile correctly
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: release-*
          merge-multiple: true
      - name: Set zip file name
        run: |
          echo ARTIFACT_NAME=`git rev-parse --short HEAD`.zip >> "$GITHUB_ENV"
          echo COMMIT_DATE=$(git show -s --format=%ci 2> /dev/null) >> "$GITHUB_ENV"
      - name: Make zip file
        run: |
          ls -l release/*
          echo ARTIFACT_NAME=$ARTIFACT_NAME
          zip -r $ARTIFACT_NAME release
          touch -m -d "$COMMIT_DATE" "$ARTIFACT_NAME"
          ls -l $ARTIFACT_NAME
      - name: Upload bundle
        uses: bayssmekanique/action-simple-file-upload@v2
        with:
          user: ${{ secrets.FTPUSER }}
          password: ${{ secrets.FTPPASS }}
          host: jotego.es
          src: ${{ env.ARTIFACT_NAME }}
          dest: ${{ env.ARTIFACT_NAME }}
      - uses: geekyeggo/delete-artifact@v4
        with:
            name: $ARTIFACT_NAME
