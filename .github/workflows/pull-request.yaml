name: Pull Request checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.head_ref || github.ref }}-pr-checks
  cancel-in-progress: true

jobs:
  beta_checks:
    uses: ./.github/workflows/beta-checks.yml
    secrets: inherit

  framework_tests:
    uses: ./.github/workflows/framework.yaml
    secrets: inherit

  linter:
    uses: ./.github/workflows/linter.yaml
    secrets: inherit

  unit_simulations:
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/simunit.yaml
    secrets: inherit

  compile_all:
    if: github.event.pull_request.draft == false
    needs:
      - beta_checks
      - framework_tests
      - linter
      - unit_simulations
    uses: ./.github/workflows/compile-all.yaml
    secrets: inherit
