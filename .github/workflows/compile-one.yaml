name: Compile one core

on:
  workflow_dispatch:
    inputs:
      core:
        description: Core folder name under cores/
        required: true
        type: string
      target:
        description: Comma-separated FPGA targets
        required: true
        type: string

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.PAT }}

      - id: compile
        run: |
          targets="${{ inputs.target }}"
          targets="${targets//,/ }"
          read -r -a args <<< "$targets"
          if [[ ${#args[@]} -eq 0 ]]; then
            echo "target must contain at least one FPGA target" >&2
            exit 1
          fi
          target_slug=$(IFS=-; echo "${args[*]}")
          echo "target_slug=$target_slug" >> "$GITHUB_OUTPUT"

          docker_image=jotego/jtcore20
          if [[ " ${args[*]} " == *" mist "* ]]; then
            if [[ ${#args[@]} -ne 1 ]]; then
              echo "mist uses jotego/jtcore13 and cannot be combined with other targets" >&2
              exit 1
            fi
            docker_image=jotego/jtcore13
          fi

          test -e "cores/${{ inputs.core }}/cfg/macros.def"

          docker run -e BETAKEY=${{ secrets.BETAKEY }} --network host -v "$(pwd)":/jtcores "$docker_image" /jtcores/modules/jtframe/devops/xjtcore.sh "${{ inputs.core }}" "${args[@]}"

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.compile.outputs.target_slug }}-${{ inputs.core }}
          path: release
          retention-days: 7
