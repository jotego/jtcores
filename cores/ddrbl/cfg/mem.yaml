clocks:
  clk24:
    - freq: 6144000
      gate: [ main, sub ]
      outputs: [ cpu ]
    - freq: 6144000
      gate: [ snd ]
      outputs: [ sndcpu ]
    - freq: 3579545
      outputs: [ ym ]
    - freq: 3579545
      outputs: [ vlm ]

# analog output network detailed in doc/RC_FILTER.md (Audio output network)
audio:
  rsum: 10k
  rsum_feedback_res: true
  channels:
    - { name: fm,   module: jt03_fm, rsum: 5.6k, rc: [{ r: 0.81k, c: 33n }] }
    # equivalent per-channel Rsum = 38k to have -11.6dB at the LA6358 output
    - { name: psga, module: jt03_psg_split, rsum: 38k, rc_en: true, rc: [{ r: 0.78k, c: 150n }] }
    - { name: psgb, module: jt03_psg_split, rsum: 38k, rc_en: true, rc: [{ r: 0.78k, c: 150n }] }
    - { name: psgc, module: jt03_psg_split, rsum: 38k, rc_en: true, rc: [{ r: 0.78k, c: 150n }] }
    # first opamp: 5.1, equivalent filter to the 2nd order one in schematics
    - { name: vlm,  module: vlm5030, rsum: 3.3k, pre: 5.1, dcrm: true, rc: [{ r:  10k, c: 47p }, { r: 2.5k, c: 1n  }] }

params:
  - { name: SND_OFFSET, value: "22'h4000" }
  - { name: VLM_OFFSET, value: "22'h8000" }

sdram:
  banks:
    - buses:
        - name: main
          addr_width: 16
          data_width: 8

    - buses:
        - name: sub
          addr_width: 15
          data_width: 8
        - name: snd
          addr_width: 15
          data_width: 8
          offset: SND_OFFSET
        - name: vlm
          addr_width: 17
          data_width: 8
          offset: VLM_OFFSET

    - buses:
        - name: gfx1          # chip1 tiles (RA16=0 half)
          addr_width: 18
          data_width: 32
        - name: gfx1obj       # chip1 sprites (high half) — own slot, same region
          addr_width: 18
          data_width: 32

    - buses:
        - name: gfx2          # chip2 tiles (RA16=0 half)
          addr_width: 19
          data_width: 32
        - name: gfx2obj       # chip2 sprites (RA16=1 half) — own slot, same region
          addr_width: 19
          data_width: 32

bram:
  - name: shared_ms
    addr_width: 13
    data_width: 8
    rw: true
    dual_port:
      name: shared_ms_b
      din:  shared_ms_b_din
      dout: shared_ms_b_dout
      rw:   true

  - name: shared_sa
    addr_width: 11
    data_width: 8
    rw: true
    dual_port:
      name: shared_sa_b
      din:  shared_sa_b_din
      dout: shared_sa_b_dout
      rw:   true

  - name: pal
    addr_width: 7
    data_width: 8
    rw: true
    simfile: {}
    dual_port:
      name: pal_v
      dout: pal_v_dout
      rw:   false

  - name: vram1
    addr_width: 13
    data_width: 8
    rw: true
    simfile: {}
    dual_port:
      name: vram1_scn
      dout: vram1_scn_dout
      rw:   false

  - name: vram2
    addr_width: 13
    data_width: 8
    rw: true
    simfile: {}
    dual_port:
      name: vram2_scn
      dout: vram2_scn_dout
      rw:   false

