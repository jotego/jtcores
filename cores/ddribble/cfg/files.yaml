ddribble:
  - get:
    - jtddribble_main.v
    - jtddribble_sub.v
    - jtddribble_sound.v
    - jtddribble_k005885.v            # ground-up 005885 port (Iron Horse / Ace model) — the active
    - jtddribble_colmix.v             # colour mixer: 007327 palette LUT/RGB DAC + LS157/LS32 priority
    - jtddribble_video.v              # video pipeline: 2x jtddribble_k005885 + their VRAM BRAMs
    - jtddribble_game.v
jtframe:
  - get:
      - jtframe_ff.v              # edge-triggered FF helper used for FIRQ latches
      - jtframe_8bit_reg.v        # CPU-written 8-bit register (main bank latch)
  - from: ram
    get:
      - jtframe_obj_buffer.v      # sprite line buffer used by jtddribble_k005885
  - from: cpu
    get:
      - jtframe_6809.yaml         # pulls in jtframe_sys6809 + helpers for our 3 CPUs
jt12:
  - get:
    - jt03.yaml                   # YM2203 (jt03 module)
vlm5030:                          # VLM5030 voice synth (vlm5030_gl module)
