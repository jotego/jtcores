clocks:
  clk24:
    - freq: 6144000
      gate: [ main, sub ]
      outputs: [ cpu ]
    - freq: 6144000
      gate: [ snd ]
      outputs: [ sndcpu ]
    - freq: 3579545
      outputs: [ ym ]
    - freq: 3579545
      outputs: [ vlm ]

params:
  - { name: SND_OFFSET, value: "22'h4000" }
  - { name: VLM_OFFSET, value: "22'h8000" }

sdram:
  banks:
    - buses:
        - name: main
          addr_width: 16
          data_width: 8

    - buses:
        - name: sub
          addr_width: 15
          data_width: 8
        - name: snd
          addr_width: 15
          data_width: 8
          offset: SND_OFFSET
        - name: vlm
          addr_width: 17
          data_width: 8
          offset: VLM_OFFSET

    - buses:
        - name: gfx1
          addr_width: 18
          data_width: 16

    - buses:
        - name: gfx2
          addr_width: 19
          data_width: 16

bram:
  - name: shared_ms
    addr_width: 13
    data_width: 8
    rw: true
    dual_port:
      name: shared_ms_b
      din:  shared_ms_b_din
      dout: shared_ms_b_dout
      rw:   true

  - name: shared_sa
    addr_width: 11
    data_width: 8
    rw: true
    dual_port:
      name: shared_sa_b
      din:  shared_sa_b_din
      dout: shared_sa_b_dout
      rw:   true

  - name: pal
    addr_width: 7
    data_width: 8
    rw: true
    simfile: {}
    dual_port:
      name: pal_v
      dout: pal_v_dout
      rw:   false

audio:
  rsum: 3.3k
  rc:   { r: 1k, c: 10n }
  channels:
    - { name: fm,  module: jt03_fm,  rsum: 3.3k }
    - { name: psg, module: jt03_psg, rsum: 7.6k, rc: [{ r: 1k, c: 33n }] }
    - { name: vlm, module: vlm5030,  rsum: 1.5k, rc: [{ r: 10k, c: 47p }, { r: 2.5k, c: 1n }] }
