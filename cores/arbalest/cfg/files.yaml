    - jtcal50_video.v
    - jtcal50_colmix.v
    - jtx1012.v
kiwi:
  - get:
    - jtkiwi_gfx.v
    - jtkiwi_obj.v
    - jtkiwi_draw.v
    - jtkiwi_tilemap.v
jtframe:
  - get:
      - jtframe_ff.v
      - jtframe_8bit_reg.v
      - jtframe_edge.v
