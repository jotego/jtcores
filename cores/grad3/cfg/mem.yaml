params:
  - { name: PCM_OFFSET, value: "(`PCM_START-`JTFRAME_BA2_START)" }
  - { name: GFX_OFFSET, value: "(`GFX_START-`JTFRAME_BA1_START) >> 1" }
clocks:
  clk48:
    - freq: 24M
      outputs:
        - cen24
        - cen12
    - freq: 3579545
      outputs:
        - cen_fm
        - cen_fm2
audio:
  rsum: 10k
  rsum_feedback_res: true
  channels:
    - { name: fm,  module: jt51,     rsum: 3.3k,  rc: [ { r: rout, c: 2.2n }, { r: 680, c: 33n } ] }
    - { name: pcm, module: jt007232, rsum: 12.0k, rc: [ { r: 33k,  c: 470p } ], pre: 0.20 }
sdram:
  banks:
    - buses:
        - name: main
          addr_width: 18
          data_width: 16
    - buses:
        - name: sub
          addr_width: 20
          data_width: 16
        - name: gfx
          addr_width: 21
          data_width: 16
          offset: GFX_OFFSET
        - name: lyro
          addr_width: 21
          data_width: 32
          offset: GFX_OFFSET
    - buses:
        - name: snd
          addr_width: 16
          data_width: 8
        - name: pcma
          addr_width: 19
          data_width: 8
          offset: PCM_OFFSET
        - name: pcmb
          addr_width: 19
          data_width: 8
          offset: PCM_OFFSET
    - buses:
        - name: gchar
          addr_width: 17
          data_width: 16
          rw: true
        - name: lyrf
          addr_width: 17
          data_width: 32
        - name: lyra
          addr_width: 17
          data_width: 32
        - name: lyrb
          addr_width: 17
          data_width: 32
bram:
  - name: m_shram
    addr_width: 14
    data_width: 16
    addr: m_shram_addr
    din: m_shram_din
    rw: true
    we: m_shram_we
    dual_port: { name: s_shram, rw: true, addr: s_shram_addr, we: s_shram_we, din: s_shram_din, dout: s_shram_dout }
  - name: palrd
    addr_width: 12
    data_width: 16
    addr: pal_rd_addr
    simfile: {}
    dual_port: { name: pal_cpu, rw: true, addr: pal_cpu_addr, we: pal_cpu_we, din: pal_cpu_din, dout: pal_cpu_dout }
