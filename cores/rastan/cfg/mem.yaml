clocks:
  clk:
    # cen4 (Z80/jt51/CIU slave) and cen2 are NOT generated here anymore: they are
    # derived in HDL by halving the 68000's cpu_cen, so the Z80 is phase-locked to
    # the 68000 exactly 2:1 (like the board's single 16MHz XTAL). pcm_cen (MSM5205
    # sample rate) is independent and stays here, on the clk domain.
    - freq: 384 kHz
      outputs:
        - pcm_cen
params:
  - { name:  RAM_OFFSET, value: "22'h10_0000" }
  - { name: VRAM_OFFSET, value: "22'h11_0000" }
  - { name:  PCM_OFFSET, value: "(`PCM_START-`JTFRAME_BA1_START)>>1"}
bram:
  # 68000 work RAM (0x10c000-0x10ffff, 16kB) in BRAM, like the board's 16kB SRAM:
  # zero wait states. Removes the sim's idealised-SDRAM advantage so the service
  # test fails like real hardware -> honest oracle for the CIU rebuild.
  - name: wram
    addr_width: 14
    data_width: 16
    addr: main_addr[13:1]
    din: main_dout
    rw: true
audio:
  rsum: 10k
  channels:
    - { name: fm,  module: jt51,   rsum: 10k,  rc: [{ r: 1rout, c: 1n   }]}  # output impedance of YM3012=10kOhm??
    - { name: pcm, module: jt5205, rsum: 9.1k, rc: [{ r: 8.6k, c: 10n  }, { r: 10.2k, c: 68n }]}
sdram:
  banks:
    - buses:
      - name: ram   # VRAM only now; 68k work RAM is in BRAM (wram, see above)
        addr_width: 18
        data_width: 16
        cs: xram_cs
        din: main_dout
        rw: true
        offset: RAM_OFFSET
      - name: main
        addr_width: 19
        data_width: 16
      - name: scr0ram
        addr_width: 16
        data_width: 32
        offset: VRAM_OFFSET
      - name: scr1ram
        addr_width: 16
        data_width: 32
        offset: VRAM_OFFSET
    - buses:
      - name: snd
        addr_width: 16
        data_width: 8
      - name: pcm
        addr_width: 16
        data_width: 8
        offset: PCM_OFFSET
    - buses:
      - name: scr0rom
        addr_width: 20
        data_width: 32
      - name: scr1rom
        addr_width: 20
        data_width: 32
    - buses:
      - name: orom
        addr_width: 20
        data_width: 32

