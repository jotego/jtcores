jtframe:
  - from: ram
    get:
      - jtframe_dual_ram.v
      - jtframe_dual_nvram.v
      - jtframe_dual_ram16.v
      - jtframe_dual_nvram16.v
      - jtframe_obj_buffer.v
      - jtframe_prom.v          # C-chip mask ROM / EPROM BRAM
  - from: clocking
    get:
      - jtframe_sync.v
      - jtframe_frac_cen.v      # C-chip 12 MHz MCU clock enable
  - from: sdram
    get:
      - jtframe_ioctl_range.v   # C-chip PROM download range decode
  - from: video
    get:
      - jtframe_vtimer.v
      - jtframe_blank.v
  - from: cpu
    get:
      - jtframe_z80.yaml
      - jtframe_m68k.yaml
