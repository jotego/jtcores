[parse]
sourcefile=["cps3.cpp"]

skip.setnames=[
	# CD games are not supported
	"redearth","warzard",
	"redearthr1", "warzardr1",
	"sfiii", "sfiiiu", "sfiiia", "sfiiij", "sfiiih",
	"sfiii2", "sfiii2j", "sfiii2h",
	"jojo",	"jojou", "jojoa", "jojoj",
	"jojor1", "jojour1", "jojoar1", "jojojr1",
	"jojor2", "jojour2", "jojoar2", "jojojr2",
	"sfiii3", "sfiii3u", "sfiii3j", "sfiii3r1", "sfiii3ur1", "sfiii3jr1",
	"jojobar1", "jojobajr1", "jojobar2", "jojobajr2",
	"jojobaj", "jojoba",
	# SIMM layout not supported yet
	"jojoban", "jojobaner1", "jojobaner2",
	"jojobanr1", "jojobanr2",
	"jojon", "jojonr1", "jojonr2", "sfiii2n", "sfiii3n", "sfiii3na",
	"sfiii3nar1","sfiii3nr1","sfiii3na","sfiii3nar1"
]
skip.machines=[
	# Bios
	"cps3boot", "cps3booto", "cps3booto2", "cps3bs32",
	"cps3bs32a", "cps3boota", "cps3bootao", "cps3bootao2",
]

main_setnames=["jojoban","jojon","redearthn","sfiiin","sfiii3nr1"]
rename=[
	{ setname="redearthn", name="CPS3 SDRAM CRC - redearthn" },
	{ setname="sfiiin",    name="CPS3 SDRAM CRC - sfiiin" },
]

[buttons]
names=[
    { names="Light Punch,Middle Punch,Heavy Punch,Light Kick,Middle Kick,Heavy Kick" },
]

[header]
fill=0
offset={start=0,bits=16,regions=["simm2.0","simm3.0","simm4.0","simm5.0"]}
data=[
	# Bytes 0x10-0x17 store the per-game CPS3 decrypt key as
	# key1[31:0], key2[31:0] in big-endian byte order.
	{ setname="redearthn",  offset=0x10, data="9e 30 0a b1 a1 75 b8 2c" },
	{ setname="redearthnr1",offset=0x10, data="9e 30 0a b1 a1 75 b8 2c" },
	{ setname="sfiiin",     offset=0x10, data="b5 fe 05 3e fc 03 92 5a" },
	{ setname="sfiiina",    offset=0x10, data="b5 fe 05 3e fc 03 92 5a" },
]

[rom]
regions=[
	{ name="bios" },
	{ name="simm1.?", width=32, no_offset=true, sequence=[1,0,3,2] },
	# { name="simm2.?", width=16, reverse=true, no_offset=true },
	{ name="simm3.?", start="JTFRAME_BA1_START", width=16, reverse=true, no_offset=true },
	{ name="simm4.?", start="JTFRAME_BA2_START", width=16, reverse=true, no_offset=true },
	{ name="simm5.?", start="JTFRAME_BA3_START", width=16, reverse=true, no_offset=true },
	# { name="simm6.?", width=16, reverse=true, no_offset=true },
]

order=[
	"bios",
	"simm1.0",
	"simm1.1",
	"simm1.2",
	"simm1.3",
