clocks:
  clk96:
    - mul: 1
      div: 2
      outputs:
        - cen_cpu
sdram:
  burst: 1kB
  cache-lanes:
    - name: cpu
      data_width: 8
      rw: true
      flush: { enable: true }
      blocks: { count: 1, size: 1kB }
bram:
  - name: text
    addr_width: 10
    data_width: 8
    rw: true
    dual_port:
      name: video
      addr: text_vaddr
      dout: text_vdata
