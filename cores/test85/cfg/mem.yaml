clocks:
  clk96:
    - freq: 6M
      outputs:
        - cen6
sdram:
  banks:
    - buses:
      - { name: cpu, addr_width: 23, data_width: 8, rw: true, do_not_erase: true }
      - { name: dummy, addr_width: 3, data_width: 8, addr: 3'd0, cs: 1'b0 }
bram:
  - name: text
    addr_width: 10
    data_width: 8
    rw: true
    dual_port:
      name: video
      addr: text_vaddr
      dout: text_vdata
